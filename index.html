<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Etiquetas Eat Kitchen</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .header {
      background: #123b6d;
      color: white;
      padding: 18px 24px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .field {
      display: flex;
      flex-direction: column;
      margin-bottom: 14px;
    }

    .field label {
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .field input,
    .field select,
    .field textarea {
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }

    .preview {
      background: #eef6e8;
      border: 1px solid #d8e6cd;
      border-radius: 10px;
      padding: 20px;
      min-height: 280px;
    }

    .preview-title {
      text-align: center;
      font-size: 34px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .preview-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 20px;
    }

    .preview-block {
      margin-bottom: 12px;
      font-size: 20px;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }

    .btn {
      background: #0f766e;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .btn.secondary {
      background: #475569;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #6b7280;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .preview-title {
        font-size: 28px;
      }

      .preview-row,
      .preview-block {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="header">Sistema de Etiquetas Eat Kitchen</div>

  <div class="container">
    <div class="grid">
      <div class="card">
        <h2>Painel Operacional</h2>

        <div class="field">
          <label>Responsável</label>
          <select id="responsavel">
            <option>Marcelo</option>
            <option>Operação CAIS</option>
            <option>Operação DINARTE</option>
          </select>
        </div>

        <div class="field">
          <label>Grupo do produto</label>
          <select id="grupo"></select>
        </div>

        <div class="field">
          <label>Nome do produto</label>
          <select id="produto"></select>
        </div>

        <div class="field">
          <label>Opção de validade (dias)</label>
          <select id="validadeDias"></select>
        </div>

        <div class="field">
          <label>Data de produção</label>
          <input id="dataProducao" type="date" />
        </div>

        <div class="field">
          <label>Hora de produção</label>
          <input id="horaProducao" type="time" />
        </div>

        <div class="field">
          <label>Quantidade de etiquetas</label>
          <input id="quantidade" type="number" value="1" min="1" />
        </div>

        <div class="field">
          <label>Lote manual</label>
          <input id="lote" />
        </div>

        <div class="field">
          <label>Conservação</label>
          <input id="conservacao" readonly />
        </div>

        <div class="field">
          <label>Observação</label>
          <textarea id="observacao" rows="3"></textarea>
        </div>

        <div class="actions">
  <button class="btn" onclick="atualizarPreview()">Atualizar preview</button>
  <button class="btn" onclick="gerarImpressao()">Gerar impressão</button>
  <button class="btn secondary" onclick="limparCampos()">Limpar</button>
</div>

        <div class="note">
          Esta é a primeira versão visual do sistema. No próximo passo vamos ligar ao banco.
        </div>
      </div>

      <div class="card">
        <h2>Preview da Etiqueta</h2>

        <div class="preview">
          <div class="preview-title" id="pvProduto">-</div>

          <div class="preview-row">
            <span id="pvData">-</span>
            <span id="pvValidade">Validade: -</span>
          </div>

          <div class="preview-row">
            <span id="pvHora">-</span>
            <span id="pvResponsavel">-</span>
          </div>

          <div class="preview-block" id="pvConservacao">-</div>
          <div class="preview-block">Cozinha Eat Kitchen</div>
          <div class="preview-block" id="pvObservacao">Observação:</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://opujvhffclwzaqwfodyd.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ToOFdbd8KwGlCyogjlWDeg_2lpSaUib";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let produtosCache = [];
async function gerarImpressao() {
  const responsavel = document.getElementById("responsavel").value;
  const grupo = document.getElementById("grupo").value;
  const produto = document.getElementById("produto").value;
  const validadeDias = document.getElementById("validadeDias").value;
  const dataProducao = document.getElementById("dataProducao").value;
  const horaProducao = document.getElementById("horaProducao").value;
  const quantidade = document.getElementById("quantidade").value;
  const lote = document.getElementById("lote").value;
  const conservacao = document.getElementById("conservacao").value;
  const observacao = document.getElementById("observacao").value;

  if (!grupo || !produto || !validadeDias || !dataProducao || !horaProducao) {
    alert("Preencha grupo, produto, validade, data e hora antes de gerar a impressão.");
    return;
  }

  const dataValidadeCalculada = calcularValidadeISO(dataProducao, validadeDias);

  const payload = {
    grupo_produto: grupo,
    nome_produto: produto,
    opcao_validade: Number(validadeDias),
    data_producao: dataProducao,
    hora_producao: horaProducao,
    quantidade_etiquetas: Number(quantidade || 1),
    lote_manual: lote || null,
    conservacao: conservacao || null,
    data_validade_calculada: dataValidadeCalculada,
    modelo_etiqueta: "PADRAO_6X4",
    observacao_padrao: observacao || null,
    status_impressao: "pendente"
  };

  const { error } = await supabaseClient
    .from("solicitacoes_impressao")
    .insert([payload]);

  if (error) {
    console.error("Erro ao salvar impressão:", error);
    alert("Erro ao gerar impressão. Abre o console e me manda o print.");
    return;
  }

  alert("Solicitação de impressão gerada com sucesso!");
}
    async function carregarProdutos() {
      const { data, error } = await supabaseClient
        .from('produtos')
        .select('*')
        .order('nome_produto', { ascending: true });

      if (error) {
        console.error('Erro ao buscar produtos:', JSON.stringify(error, null, 2));
        return;
      }

      console.log('Produtos carregados:', data);

      produtosCache = data || [];
      carregarGrupos();
      preencherProdutosFiltrados();
    }

    function carregarGrupos() {
      const selectGrupo = document.getElementById('grupo');
      selectGrupo.innerHTML = '';

      const optionInicial = document.createElement('option');
      optionInicial.value = '';
      optionInicial.textContent = 'Selecione um grupo';
      selectGrupo.appendChild(optionInicial);

      const gruposUnicos = [...new Set(
        produtosCache
          .map(item => item.categoria)
          .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b, 'pt-BR'));

      gruposUnicos.forEach((grupo) => {
        const option = document.createElement('option');
        option.value = grupo;
        option.textContent = grupo;
        selectGrupo.appendChild(option);
      });

      selectGrupo.onchange = () => {
        preencherProdutosFiltrados();
        limparSelecaoProduto();
      };
    }

    function preencherProdutosFiltrados() {
      const selectGrupo = document.getElementById('grupo');
      const selectProduto = document.getElementById('produto');
      const grupoSelecionado = selectGrupo.value;

      selectProduto.innerHTML = '';

      const optionInicial = document.createElement('option');
      optionInicial.value = '';
      optionInicial.textContent = 'Selecione um produto';
      selectProduto.appendChild(optionInicial);

      let produtosFiltrados = produtosCache;

      if (grupoSelecionado) {
        produtosFiltrados = produtosCache.filter(
          item => item.categoria === grupoSelecionado
        );
      }

      const nomesUnicos = [...new Set(
        produtosFiltrados
          .map(item => item.nome_produto)
          .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b, 'pt-BR'));

      nomesUnicos.forEach((nome) => {
        const option = document.createElement('option');
        option.value = nome;
        option.textContent = nome;
        selectProduto.appendChild(option);
      });

      selectProduto.onchange = () => {
        preencherValidadesDoProduto();
      };
    }

    function preencherValidadesDoProduto() {
  const grupo = document.getElementById('grupo').value;
  const produto = document.getElementById('produto').value;
  const selectValidade = document.getElementById('validadeDias');

  selectValidade.innerHTML = '';
  document.getElementById('conservacao').value = '';

  if (!produto) {
    atualizarPreview();
    return;
  }

  let encontrados = produtosCache.filter(item => String(item.nome_produto) === String(produto));

  if (grupo) {
    encontrados = encontrados.filter(item => String(item.categoria) === String(grupo));
  }

  if (!encontrados.length) {
    atualizarPreview();
    return;
  }
function preencherDataHoraAtual() {
  const hoje = new Date();

  const ano = hoje.getFullYear();
  const mes = String(hoje.getMonth() + 1).padStart(2, "0");
  const dia = String(hoje.getDate()).padStart(2, "0");

  const horas = String(hoje.getHours()).padStart(2, "0");
  const minutos = String(hoje.getMinutes()).padStart(2, "0");

  document.getElementById("dataProducao").value = `${ano}-${mes}-${dia}`;
  document.getElementById("horaProducao").value = `${horas}:${minutos}`;
}
  const validadesUnicas = [...new Set(
    encontrados
      .map(item => item.validade_dias)
      .filter(v => v !== null && v !== undefined && v !== '')
      .map(v => String(v).trim())
  )].sort((a, b) => Number(a) - Number(b));

  const optionInicial = document.createElement('option');
  optionInicial.value = '';
  optionInicial.textContent = 'Selecione a validade';
  selectValidade.appendChild(optionInicial);

  validadesUnicas.forEach((validade) => {
    const option = document.createElement('option');
    option.value = validade;
    option.textContent = validade;
    selectValidade.appendChild(option);
  });

  if (validadesUnicas.length === 1) {
    selectValidade.value = validadesUnicas[0];
    preencherConservacao();
  } else {
    atualizarPreview();
  }
}

   function preencherConservacao() {
  const grupo = document.getElementById('grupo').value;
  const produto = document.getElementById('produto').value;
  const validade = document.getElementById('validadeDias').value;

  if (!produto || !validade) {
    document.getElementById('conservacao').value = '';
    atualizarPreview();
    return;
  }

  let encontrados = produtosCache.filter(item => String(item.nome_produto) === String(produto));

  if (grupo) {
    encontrados = encontrados.filter(item => String(item.categoria) === String(grupo));
  }

  encontrados = encontrados.filter(
    item => String(item.validade_dias).trim() === String(validade).trim()
  );

  if (!encontrados.length) {
    document.getElementById('conservacao').value = '';
    atualizarPreview();
    return;
  }

  document.getElementById('conservacao').value = encontrados[0].conservacao || '';
  atualizarPreview();
}

    function limparSelecaoProduto() {
      document.getElementById('produto').value = '';
      document.getElementById('validadeDias').innerHTML = '';
      document.getElementById('conservacao').value = '';
      atualizarPreview();
    }

    function formatarDataBR(dataISO) {
      if (!dataISO) return "";
      const [ano, mes, dia] = dataISO.split("-");
      return `${dia}/${mes}/${ano}`;
    }

    function calcularValidade(dataISO, dias) {
      if (!dataISO || !dias) return "";
      const data = new Date(dataISO + "T00:00:00");
      data.setDate(data.getDate() + Number(dias));

      const dia = String(data.getDate()).padStart(2, "0");
      const mes = String(data.getMonth() + 1).padStart(2, "0");
      const ano = data.getFullYear();

      return `${dia}/${mes}/${ano}`;
    }
function calcularValidadeISO(dataISO, dias) {
  if (!dataISO || !dias) return null;

  const data = new Date(dataISO + "T00:00:00");
  data.setDate(data.getDate() + Number(dias));

  const ano = data.getFullYear();
  const mes = String(data.getMonth() + 1).padStart(2, "0");
  const dia = String(data.getDate()).padStart(2, "0");

  return `${ano}-${mes}-${dia}`;
}
    function atualizarPreview() {
      const responsavel = document.getElementById("responsavel").value;
      const produto = document.getElementById("produto").value;
      const validadeDias = document.getElementById("validadeDias").value;
      const dataProducao = document.getElementById("dataProducao").value;
      const horaProducao = document.getElementById("horaProducao").value;
      const conservacao = document.getElementById("conservacao").value;
      const observacao = document.getElementById("observacao").value;

      document.getElementById("pvProduto").textContent = produto || "-";
      document.getElementById("pvData").textContent = formatarDataBR(dataProducao) || "-";
      document.getElementById("pvValidade").textContent = "Validade: " + (calcularValidade(dataProducao, validadeDias) || "-");
      document.getElementById("pvHora").textContent = horaProducao || "-";
      document.getElementById("pvResponsavel").textContent = responsavel || "-";
      document.getElementById("pvConservacao").textContent = conservacao || "-";
      document.getElementById("pvObservacao").textContent = "Observação: " + (observacao || "");
    }

    function limparCampos() {
      document.getElementById("grupo").value = "";
      document.getElementById("produto").innerHTML = "";
      document.getElementById("validadeDias").innerHTML = "";
      document.getElementById("dataProducao").value = "";
      document.getElementById("horaProducao").value = "";
      document.getElementById("quantidade").value = "1";
      document.getElementById("lote").value = "";
      document.getElementById("conservacao").value = "";
      document.getElementById("observacao").value = "";

      preencherProdutosFiltrados();
      atualizarPreview();
    }

    document.getElementById('validadeDias').addEventListener('change', () => {
      preencherConservacao();
    });

    carregarProdutos();
    atualizarPreview();
  </script>
</body>
</html>
